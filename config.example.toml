# Bootstrap configuration. Everything else (NNTP providers, indexers,
# TMDB API key, preferences) is configured at runtime via the API and
# stored in SQLite.
#
# Every value can be overridden via environment variables:
#   APP_SERVER__PORT=9090, APP_AUTH__API_KEY=..., etc.

[server]
host = "0.0.0.0"
port = 8080

[auth]
# Required. Clients send this in the X-Api-Key header (or ?apikey= query).
api_key = ""

[database]
path = "data/usenet-streamer.db"

[storage]
# Server-side downloads land here.
download_dir = "data/downloads"
# Per-session HLS segments (defaults to OS temp dir).
# session_dir = "/tmp/usenet-streamer-sessions"

[cache]
# In-memory decoded segment cache bound (bytes). Default 512 MiB.
memory_bytes = 536870912

[streaming]
session_idle_timeout_secs = 120
readahead_segments = 16
ffmpeg_path = "ffmpeg"
ffprobe_path = "ffprobe"
# par2cmdline binary for the download-and-repair fallback on partially-
# available releases. Installed in the Docker image; on bare-metal install
# `par2` (e.g. apt-get install par2 / brew install par2cmdline).
par2_path = "par2"

[subtitles]
# Optional operator-supplied default OpenSubtitles consumer API key. Set this
# ONCE at deploy time (e.g. on your NAS) so users only ever manage their
# OpenSubtitles username/password — the "Jellyfin experience". A per-user key
# stored via the API/web UI takes precedence when present; when neither is set,
# subtitles stay disabled (playback still works).
#
# Operator-supplied only — never bundled. Get a free consumer key at
# https://www.opensubtitles.com/consumers. Prefer the env var so the key stays
# out of the repo:  APP_SUBTITLES__OPENSUBTITLES_DEFAULT_API_KEY=your-key
# opensubtitles_default_api_key = ""

[analysis]
# fpcalc (chromaprint) binary for best-effort audio-fingerprint intro
# detection — the automatic "Skip Intro" for TV releases without intro
# chapters. Installed in the Docker image (libchromaprint-tools); on bare-metal
# install it (e.g. apt-get install libchromaprint-tools / brew install
# chromaprint). A missing binary just disables the feature — playback is
# unaffected.
fpcalc_path = "fpcalc"
