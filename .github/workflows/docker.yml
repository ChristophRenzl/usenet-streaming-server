name: Docker

on:
  push:
    branches: [main]
    tags: ["v*"]

env:
  REGISTRY: git.kreideee.com

jobs:
  build:
    runs-on: docker
    steps:
      - uses: actions/checkout@v4

      - name: Prepare
        run: |
          echo "IMAGE=${REGISTRY}/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=sha

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache
          cache-to: type=registry,mode=max,ref=${{ env.IMAGE }}:buildcache,image-manifest=true

      - name: Inspect
        run: docker buildx imagetools inspect "$IMAGE:${{ steps.meta.outputs.version }}"
