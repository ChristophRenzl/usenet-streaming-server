name: Test

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # The runner has limited RAM: linking the test binaries in parallel with
  # full debuginfo got ld OOM-killed ("ld terminated with signal 9"). Debug
  # symbols are useless in CI anyway — dropping them shrinks link memory by
  # an order of magnitude (backtraces keep line info via debug-assertions).
  CARGO_PROFILE_DEV_DEBUG: "0"
  CARGO_PROFILE_TEST_DEBUG: "0"

jobs:
  check:
    runs-on: docker
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install ffmpeg and par2
        run: sudo apt-get update && sudo apt-get install -y ffmpeg par2
      # fpcalc is optional: every fpcalc-dependent test is skip-gated, so a
      # runner image whose sources lack the package must not fail the job.
      - name: Install chromaprint (best-effort)
        run: sudo apt-get install -y libchromaprint-tools || echo "libchromaprint-tools unavailable; fpcalc-gated tests run without it"
      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        # -j 2 also caps how many test binaries link at once — several
        # parallel ld processes were what pushed the runner over the edge.
        run: cargo test -j 2
